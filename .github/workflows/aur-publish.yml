name: Bump AUR Package

on:
  push:
    tags:
      - "v*" # سيشتغل التلقائي فوراً عند رفع أي تاغ يبدأ بحرف v

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          # سياخذ رقم الإصدار بدون حرف الـ v (مثلاً: 0.1.2)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # إضافة سيرفر الـ AUR للمفاتيح الموثوقة لتجنب رسائل التأكيد
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR Package Repository
        run: |
          # استبدل ax-cli باسم مستودعك بالـ AUR إذا كان مختلفاً
          git clone ssh://aur@aur.archlinux.org/ax-cli.git /tmp/aur-repo

      - name: Update PKGBUILD and SRCINFO
        run: |
          cd /tmp/aur-repo

          # إعداد بيانات الجيت داخل سيرفر الـ Action
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # تحديث رقم الـ pkgver داخل ملف PKGBUILD تلقائياً
          NEW_VER="${{ steps.get_version.outputs.VERSION }}"
          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD
          # إعادة الـ pkgrel إلى 1 عند صدور نسخة جديدة
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # تثبيت أدوات arch linux على سيرفر Ubuntu لتشغيل makepkg وتحديث الـ .SRCINFO
          sudo apt-get update && sudo apt-get install -y bsdmainutils
          # محاكاة توليد الـ .SRCINFO بدون الحاجة لبيئة آرش كاملة
          # الطريقة الأضمن هي تشغيل الأمر عبر سكربت بسيط أو عبر docker، لكن سأعطيك الطريقة الأسرع لتحديث الـ SRCINFO يدوياً بالـ sed أو عبر الأداة الرسمية:
          sed -i "s/pkgver = .*/pkgver = $NEW_VER/" .SRCINFO
          sed -i "s/pkgrel = .*/pkgrel = 1/" .SRCINFO

          # عمل push للتعديلات إلى الـ AUR
          git add PKGBUILD .SRCINFO
          git commit -m "AUR: Bump version to $NEW_VER via GitHub Actions"
          git push origin master
