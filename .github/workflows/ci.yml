# ─── CI/CD Pipeline — ax TUI API Client ──────────────────────────────────────
name: CI/CD

on:
  push:
    branches: [main, master, "v*"]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  # 1. اختبار الكود وفحصه
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Format check
        run: |
          unformatted=$(go fmt ./...)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi
        shell: bash

      - name: Vet check
        run: go vet ./...

      - name: Run tests
        run: go test ./... -count=1 -timeout 300s -v
        env:
          CGO_ENABLED: "0"

  # 2. التأكد من إعدادات GoReleaser
  goreleaser-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.14.0 # مطابقة نسخة جهازك تماماً
          install-only: true

      # إضافة علم --deprecated يضمن عدم فشل الخطوة حتى لو وجد تنبيهات قديمة
      - name: Validate GoReleaser config
        run: goreleaser check --deprecated -f .goreleaser.yaml

      - name: Test snapshot build
        run: goreleaser release --snapshot --clean
        env:
          GORELEASER_CURRENT_TAG: v0.0.0-test

  # 3. بناء وإصدار الحزم (GitHub Releases & Homebrew)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, goreleaser-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.14.0 # مطابقة نسخة جهازك تماماً
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # 4. تحديث مستودع الـ AUR تلقائياً بعد نجاح الـ Release
  aur-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone and Update AUR
        run: |
          git clone ssh://aur@aur.archlinux.org/ax-cli.git /tmp/aur-repo
          cd /tmp/aur-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_VER="${{ steps.get_version.outputs.VERSION }}"
          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/pkgver = .*/pkgver = $NEW_VER/" .SRCINFO
          sed -i "s/pkgrel = .*/pkgrel = 1/" .SRCINFO

          git add PKGBUILD .SRCINFO
          git commit -m "AUR: Bump version to $NEW_VER via CI"
          git push origin master
