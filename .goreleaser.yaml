version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/ax/main.go
    binary: ax
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "ax_${{ .Version }}_${{ .Os }}_${{ .Arch }}"

brews:
  - name: ax-cli
    repository:
      owner: zaidejjo
      name: homebrew-tap
      token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    directory: Formula
    homepage: "https://github.com/zaidejjo/ax"
    description: "ax — TUI API Client: a terminal-based HTTP client"
    license: "MIT"
