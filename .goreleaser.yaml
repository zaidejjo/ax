version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/ax/main.go
    binary: ax
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "ax_${{ .Version }}_${{ .Os }}_${{ .Arch }}"
